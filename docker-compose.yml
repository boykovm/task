  be:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: task_be
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
#      redis:
#        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-taskdb}
      REDIS_URL: redis://redis:6379
    ports:
      - "4443:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  postgres_data:
#  redis_data:

